<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- White outline filter: dilates the shape alpha and floods it white, composited behind the original -->
    <filter id="white-outline" x="-8%" y="-8%" width="116%" height="116%" color-interpolation-filters="sRGB">
      <!-- Step 1: Grow the shape alpha outward to create the border thickness -->
      <feMorphology in="SourceAlpha" operator="dilate" radius="4" result="dilated" />
      <!-- Step 2: Flood with white -->
      <feFlood flood-color="#ffffff" flood-opacity="1" result="white-fill" />
      <!-- Step 3: Clip the white flood to the dilated shape -->
      <feComposite in="white-fill" in2="dilated" operator="in" result="white-border" />
      <!-- Step 4: Drop shadow on the dilated shape for depth -->
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.45" result="shadow" />
      <!-- Step 5: Merge white border + original graphic on top -->
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="white-border" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Wrapper group so the single filter covers all elements -->
  <g filter="url(#white-outline)">
    <!-- Left Pillar and Crossbar (Forms the left half and bridge of the 'H') -->
    <!-- Designed with a precise right-pointing cut to nestle into the chevron -->
    <path
      d="M 88 90
         L 152 90
         L 152 186
         L 320 186
         L 344 218
         L 320 250
         L 152 250
         L 152 346
         L 88 346 Z"
      fill="#0F172A"
    />

    <!-- The "Automation" Chevron (Forms the right half of the 'H') -->
    <!-- Features a precisely calculated 16px gap between the crossbar to simulate speed and modularity -->
    <path
      d="M 264 90
         L 328 90
         L 424 218
         L 328 346
         L 264 346
         L 360 218 Z"
      fill="#0EA5E9"
    />

    <!-- Logotype / Branding -->
    <text
      x="256"
      y="422"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
      font-size="52"
      font-weight="800"
      text-anchor="middle"
      letter-spacing="-1.5"
    >
      <tspan fill="#0F172A">Hunt</tspan><tspan fill="#0EA5E9">OS</tspan>
    </text>
  </g>
</svg>
