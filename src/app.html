<!doctype html>
<html lang="en" data-theme="cerberus">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Primary Meta -->
		<title>HuntOS</title>
		<meta name="application-name" content="HuntOS" />
		<meta name="description" content="Automated job application assistant powered by AI agents." />
		<meta name="theme-color" content="#0EA5E9" />

		<!-- Favicons -->
		<link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
		<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />

		<!-- Apple Touch Icon -->
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

		<!-- Android / PWA -->
		<link rel="manifest" href="/site.webmanifest" />
		<meta name="mobile-web-app-capable" content="yes" />

		<!-- Microsoft Tiles -->
		<meta name="msapplication-TileColor" content="#0F172A" />
		<meta name="msapplication-TileImage" content="/mstile-150x150.png" />
		<meta name="msapplication-config" content="/browserconfig.xml" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="HuntOS" />
		<meta
			property="og:description"
			content="Automated job application assistant powered by AI agents."
		/>
		<meta property="og:image" content="/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="HuntOS" />
		<meta
			name="twitter:description"
			content="Automated job application assistant powered by AI agents."
		/>
		<meta name="twitter:image" content="/og-image.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
